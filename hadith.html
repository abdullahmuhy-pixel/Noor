<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hadith Collection — Noor</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#152E2B">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#152E2B; --ink-soft:#2C4A45;
    --parchment:#FBF7EE; --parchment-dim:#F2ECDD;
    --gold:#A9803F; --gold-soft:#D9C08F;
  }
  [data-theme="dark"]{
    --ink:#0E1F1D; --ink-soft:#16302C;
    --parchment:#171512; --parchment-dim:#211D17;
    --gold:#D9B26B; --gold-soft:#E7CE9C;
  }
  *{ box-sizing:border-box; }
  body{ margin:0; font-family:'Inter',sans-serif; background:var(--parchment); color:var(--ink); padding-bottom:100px; }
  header{
    background:linear-gradient(180deg, var(--ink) 0%, var(--ink-soft) 100%);
    color:var(--parchment); padding:22px 20px 18px; position:sticky; top:0; z-index:5;
  }
  header a{ color:var(--gold-soft); text-decoration:none; font-size:0.85rem; }
  h1{ font-family:'Amiri',serif; font-size:1.5rem; margin:10px 0 12px; }
  select{
    width:100%; padding:10px 12px; border-radius:10px;
    border:1px solid rgba(217,192,143,0.35); background:rgba(251,247,238,0.08);
    color:var(--parchment); font-size:0.9rem; font-family:'Inter',sans-serif;
  }
  main{ max-width:680px; margin:0 auto; padding:20px; }
  #status{ text-align:center; opacity:0.6; padding:40px 0; }
  .hadith-card{
    background:var(--parchment-dim); border:1px solid rgba(169,128,63,0.25);
    border-radius:14px; padding:18px; margin-bottom:14px;
  }
  .hadith-num{ font-size:0.75rem; color:var(--gold); font-weight:600; margin-bottom:8px; }
  .arabic{
    font-family:'Amiri',serif; font-size:1.3rem; line-height:2; direction:rtl; text-align:right;
    margin-bottom:14px; color:var(--ink);
  }
  .narrator{ font-size:0.8rem; opacity:0.65; font-style:italic; margin-bottom:6px; }
  .english{ font-size:0.98rem; line-height:1.6; margin-bottom:12px; }
  .narrate-btn{
    background:none; border:1px solid rgba(169,128,63,0.4); color:var(--gold);
    padding:7px 14px; border-radius:20px; font-size:0.8rem; cursor:pointer;
    font-family:'Inter',sans-serif; display:inline-flex; align-items:center; gap:6px;
  }
  .pager{
    position:fixed; bottom:0; left:0; right:0; background:var(--ink); color:var(--parchment);
    padding:12px 16px; display:flex; align-items:center; justify-content:space-between; gap:10px;
  }
  .pager button{
    background:rgba(251,247,238,0.1); border:1px solid rgba(217,192,143,0.3); color:var(--parchment);
    padding:10px 18px; border-radius:10px; font-family:'Inter',sans-serif; cursor:pointer;
  }
  .pager button:disabled{ opacity:0.35; }
  .pager .pos{ font-size:0.85rem; opacity:0.8; }
</style>
</head>
<body>
<header>
  <a href="index.html">&larr; Back to Noor</a>
  <h1>Hadith Collection</h1>
  <select id="bookSelect">
    <option value="bukhari">Sahih al-Bukhari</option>
    <option value="muslim">Sahih Muslim</option>
    <option value="abudawud">Sunan Abi Dawud</option>
    <option value="tirmidhi">Jami` at-Tirmidhi</option>
    <option value="nasai">Sunan an-Nasa'i</option>
    <option value="ibnmajah">Sunan Ibn Majah</option>
    <option value="malik">Muwatta Malik</option>
    <option value="ahmed">Musnad Ahmad</option>
    <option value="darimi">Sunan ad-Darimi</option>
  </select>
</header>

<main>
  <div id="status">Loading hadith collection…</div>
  <div id="hadithContainer"></div>
</main>

<div class="pager" id="pager" style="display:none;">
  <button id="prevBtn">&larr; Prev</button>
  <span class="pos" id="pos">—</span>
  <button id="nextBtn">Next &rarr;</button>
</div>

<audio id="audioEl" style="display:none;"></audio>

<script>
  var PAGE_SIZE = 15;

  var els = {
    bookSelect: document.getElementById("bookSelect"),
    status: document.getElementById("status"),
    container: document.getElementById("hadithContainer"),
    pager: document.getElementById("pager"),
    prevBtn: document.getElementById("prevBtn"),
    nextBtn: document.getElementById("nextBtn"),
    pos: document.getElementById("pos"),
    audioEl: document.getElementById("audioEl")
  };

  var state = {
    book: "bukhari",
    hadiths: [],
    page: 0
  };

  var bookCache = {};

  // Try multiple known-possible URLs in order, since this dataset's GitHub
  // username changed at some point and different mirrors/CDNs may only
  // have one of them cached correctly. First one that returns valid data wins.
  function candidateUrls(bookId){
    return [
      "https://cdn.jsdelivr.net/gh/AhmedBaset/hadith-json@v1.2.0/db/by_book/the_9_books/" + bookId + ".json",
      "https://raw.githubusercontent.com/AhmedBaset/hadith-json/v1.2.0/db/by_book/the_9_books/" + bookId + ".json",
      "https://raw.githubusercontent.com/A7med3bdulBaset/hadith-json/v1.2.0/db/by_book/the_9_books/" + bookId + ".json",
      "https://cdn.jsdelivr.net/gh/A7med3bdulBaset/hadith-json@v1.2.0/db/by_book/the_9_books/" + bookId + ".json"
    ];
  }

  // The dataset should be a plain array of hadith objects, but handle it
  // gracefully if it's ever wrapped in a container object instead.
  function normalizeHadithData(data){
    if(Array.isArray(data)) return data;
    if(data && Array.isArray(data.hadiths)) return data.hadiths;
    if(data && Array.isArray(data.data)) return data.data;
    return null;
  }

  function tryUrls(urls, index){
    if(index >= urls.length){
      return Promise.reject(new Error("None of the known data sources responded correctly."));
    }
    return fetch(urls[index])
      .then(function(res){
        if(!res.ok) throw new Error("HTTP " + res.status);
        return res.json();
      })
      .then(function(data){
        var normalized = normalizeHadithData(data);
        if(!normalized || normalized.length === 0){
          throw new Error("Response didn't contain the expected hadith list shape.");
        }
        return normalized;
      })
      .catch(function(err){
        console.warn("Hadith source failed (" + urls[index] + "):", err.message);
        return tryUrls(urls, index + 1);
      });
  }

  function loadBook(bookId){
    els.status.textContent = "Loading " + els.bookSelect.selectedOptions[0].text + "…";
    els.status.style.display = "block";
    els.container.innerHTML = "";
    els.pager.style.display = "none";

    if(bookCache[bookId]){
      state.hadiths = bookCache[bookId];
      state.page = 0;
      renderPage();
      return;
    }

    tryUrls(candidateUrls(bookId), 0)
      .then(function(hadiths){
        bookCache[bookId] = hadiths;
        state.hadiths = hadiths;
        state.page = 0;
        renderPage();
      })
      .catch(function(err){
        els.status.style.display = "block";
        els.status.textContent = "Couldn't load this collection (" + err.message + "). " +
          "Check your connection and try again, or try a different book — tell Claude the exact " +
          "message above if this keeps happening so the data source can be fixed properly.";
        console.error("All hadith sources failed:", err);
      });
  }

  function renderPage(){
    els.status.style.display = "none";
    var start = state.page * PAGE_SIZE;
    var pageItems = state.hadiths.slice(start, start + PAGE_SIZE);

    els.container.innerHTML = pageItems.map(function(h){
      var arabic = h.arabic || h.arabicText || h.arab || "";
      var narrator = (h.english && h.english.narrator) || h.narrator || "";
      var text = (h.english && h.english.text) || h.text || h.englishText || "";
      var num = h.id || h.hadithnumber || h.number || "";
      return '<div class="hadith-card">' +
        '<div class="hadith-num">Hadith ' + num + '</div>' +
        '<div class="arabic">' + arabic + '</div>' +
        '<div class="narrator">' + narrator + '</div>' +
        '<div class="english">' + text + '</div>' +
        '<button class="narrate-btn" data-text="' + escapeAttr(text) + '">&#9835; Narrate</button>' +
        '</div>';
    }).join("");

    var totalPages = Math.max(1, Math.ceil(state.hadiths.length / PAGE_SIZE));
    els.pos.textContent = "Page " + (state.page + 1) + " of " + totalPages + " (" + state.hadiths.length + " hadiths)";
    els.prevBtn.disabled = state.page === 0;
    els.nextBtn.disabled = state.page >= totalPages - 1;
    els.pager.style.display = "flex";

    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function escapeAttr(str){
    return String(str).replace(/&/g, "&amp;").replace(/"/g, "&quot;");
  }

  els.container.addEventListener("click", function(e){
    var btn = e.target.closest(".narrate-btn");
    if(!btn) return;
    var text = btn.getAttribute("data-text");
    btn.textContent = "Speaking…";
    speakText(text, function(){ btn.innerHTML = "&#9835; Narrate"; });
  });

  // Reuses the same on-device speech approach as the main app. Full
  // generated-audio support (Google TTS + permanent caching) can be added
  // here later the same way it was wired into index.html, reusing the
  // same GOOGLE_KEY_STORAGE / TTS_VOICE_STORAGE localStorage keys so a
  // key entered in Noor's settings would already carry over.
  function speakText(text, onDone){
    if(!("speechSynthesis" in window)){ onDone(); return; }
    window.speechSynthesis.cancel();
    var utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.95;
    utter.onend = onDone;
    utter.onerror = onDone;
    window.speechSynthesis.speak(utter);
  }

  els.bookSelect.addEventListener("change", function(){
    state.book = els.bookSelect.value;
    loadBook(state.book);
  });
  els.prevBtn.addEventListener("click", function(){
    if(state.page > 0){ state.page--; renderPage(); }
  });
  els.nextBtn.addEventListener("click", function(){
    var totalPages = Math.ceil(state.hadiths.length / PAGE_SIZE);
    if(state.page < totalPages - 1){ state.page++; renderPage(); }
  });

  try{
    var prefs = JSON.parse(localStorage.getItem("noor_prefs_v1") || "{}");
    if(prefs.theme === "dark") document.documentElement.setAttribute("data-theme", "dark");
  }catch(e){}

  loadBook(state.book);
</script>
</body>
</html>
