  // Each chapter is an array of narratable sections. This grows over time —
  // currently covers the earliest period of the seerah; later chapters

  var CHAPTERS = [
    {
      title: "Before the Light",
      meta: "Lineage through the Farewell Sermon's earliest roots — birth to marriage with Khadijah",
      sections: [
        "In the year later remembered as the Year of the Elephant, a Yemeni ruler named Abraha marched a large army — with a war elephant named Mahmud at its center — on Makkah, intending to tear down the Ka'bah and redirect Arabia's pilgrimage traffic to a cathedral he had built in Sana'a instead. Tradition holds that as the army neared the sanctuary, the elephant itself simply refused to advance any further no matter how it was driven, and shortly after, flocks of birds appeared overhead dropping small stones that devastated the invading force, turning back the whole expedition within sight of the Ka'bah it had come to destroy. That same year, in the tribe of Quraysh, a boy was born who would carry no father's memory with him at all — Abdullah had died on a trading journey before his son ever opened his eyes.",
        "His mother, Aminah, named him Muhammad — 'the praised one' — a name almost unused among the Arabs of that time, as though something in the choosing already reached toward what he would become. Following the custom of Makkah's noble families, the infant was sent out to the desert to be nursed among the Bani Sa'd, where clean air and pure Arabic speech shaped a child's earliest years away from the city.",
        "It was there, in the household of his foster mother Halimah, that unmistakable signs began to gather around him — a household that had known lean seasons suddenly found its flocks fattening and its wells filling from the day he arrived. Halimah, moved by what she could not explain, kept him with her longer than custom required, reluctant to return him to his own mother.",
        "One incident from these years with Halimah's family is remembered vividly: while playing with other children, he was taken aside by two figures who, in the tradition's telling, opened his chest, removed his heart, washed it, and returned it to him — an event known as Shaqq al-Sadr, which frightened Halimah enough that she eventually decided, despite everything good that had come from raising him, that it was time to return him safely to his own mother in Makkah.",
        "When he did return to Makkah, it was not for long. Before he had reached six years old, his mother Aminah died on the road back from visiting his father's grave in Madinah, leaving him orphaned twice over before he could remember either parent clearly. His grandfather, Abd al-Muttalib, took him in with visible tenderness, seating the boy beside himself in gatherings where grown men waited to be invited — until two years later, the grandfather too was gone, and guardianship passed to his uncle, Abu Talib.",
        "Abu Talib was not a wealthy man, but he loved his nephew as his own, and took him along on a trading journey to Syria while he was still young. It was on this journey, tradition holds, that a Christian monk named Bahira met the caravan, looked closely at the boy, and told Abu Talib to guard him carefully — recognizing, from what he had studied in older scriptures, signs of a coming prophet.",
        "The years that followed were quiet ones by any outward measure: he tended sheep in the hills above Makkah, work that taught patience and solitude before anything else did. As a young man he took part in a defensive skirmish remembered as the War of Fijar, and afterward joined an alliance of Makkah's clans — the Hilf al-Fudul — formed after a visiting trader was cheated and abused with no clan of his own to seek justice for him. The alliance swore to stand together for the wronged and the stranger, regardless of tribe, and Muhammad would later say, even after prophethood had changed everything else about his life, that he would still answer a call to that same pledge if it were made again.",
        "His honesty on trading journeys earned him a name before he ever preached a single verse — al-Amin, the trustworthy one — a reputation that reached a wealthy widow named Khadijah, who hired him to lead a caravan to Syria on her behalf. The journey returned with profits beyond what she expected, and with it, word of his character from those who had traveled with him. Khadijah, fifteen years his senior and twice widowed, sent a proposal of marriage through an intermediary. He accepted, and their marriage — by every account that survives it — was one of deep partnership and equal devotion, lasting until her death and never repeated in kind with any wife after her.",
        "One incident from these years before revelation is still told for what it reveals about him: when the Ka'bah was being rebuilt after flood damage, the clans of Makkah nearly came to blows over which of them would have the honor of setting the sacred Black Stone back into its place. It was agreed that whoever entered the sanctuary next would decide the matter. That person was Muhammad. He spread out a cloak, placed the stone in its center, and had a representative from every clan lift one edge together — so that no single tribe could claim the honor alone, and no blood was shed over a stone meant to unite them."
      ]
    },
    {
      title: "The Cave of Hira",
      meta: "The first revelation and the beginning of prophethood",
      sections: [
        "As he entered his fortieth year, Muhammad had developed a habit his own people found unusual: withdrawing for days at a stretch to a small cave on the mountain of Hira, just outside Makkah, taking little food and spending long hours in quiet reflection — away from the idols, the tribal disputes, and the noise of a city he had grown increasingly uneasy within, though he could not yet have said exactly why.",
        "It was during one of these retreats, in the month of Ramadan, that everything changed. A presence entered the cave that he could not see fully, and a voice commanded him: 'Read.' He answered honestly — he could not read; he had never been taught. The command came again, and again he gave the same answer, until on the third time the being embraced him tightly and then released him with the words that would open the entire Quran's revelation: 'Read, in the name of your Lord who created — created man from a clinging clot. Read, and your Lord is the Most Generous, who taught by the pen, taught man what he did not know.'",
        "He fled the cave shaking, uncertain what had happened to him, and ran the distance home to Khadijah saying only, 'Cover me, cover me,' until the trembling passed. When he was able to speak, he told her everything, ending with words that carried real fear in them — that he feared for himself, for his own mind, for what this meant. In the days that followed, whenever revelation came again, those close to him would describe a real physical toll accompanying it — a heaviness settling over him, sweat forming even in cold weather, and on at least one occasion his own thigh, resting against a companion's leg at the time, feeling so heavy that his companion later said he feared it would be crushed.",
        "Khadijah's response is remembered as one of the great acts of faith in the entire story: without hesitation, she told him that Allah would never let him down — reminding him that he was a man who held family ties, spoke truthfully, carried the burdens of others, helped the poor, welcomed guests, and stood by those struck by hardship. A person like that, she said, is not abandoned.",
        "She took him to her cousin, Waraqah ibn Nawfal, an elderly man who had studied earlier scripture and become Christian in his old age, nearly blind by then but sharp in memory. Waraqah listened to what had happened in the cave and said plainly that this was the same angel — Gabriel — who had come to Moses, and that Muhammad was being made a prophet to his people. He added, with sorrow already in his voice, that he wished he could be young again to stand by him when his own people would drive him out — because, Waraqah said, no one had ever brought what he was about to bring without being opposed.",
        "For a time after this first encounter, the revelation paused entirely — a stretch of silence remembered as the fatrah, and the toll it took on him is described candidly rather than glossed over: he is reported to have gone out toward the mountain peaks more than once during this silence, in real anguish at its absence, only to be stopped short by the sight of Gabriel appearing on the horizon, filling the whole span of the sky between earth and heaven, a sight that steadied him each time until he returned home still shaken.",
        "When the silence finally broke, it came again from the mountain, this time with the words that would define his mission from that point forward: 'O you who is covered, arise and warn.' The quiet years of a trader and shepherd were over. What followed would reshape Arabia, and eventually reach far beyond it."
      ]
    },
    {
      title: "The First Believers",
      meta: "Private devotion, the first converts, and the move to open preaching",
      sections: [
        "Khadijah was the very first to believe him — not after questioning, not after proof, simply upon hearing what had happened in the cave. In his own household, his young cousin Ali, still a boy being raised under his roof, accepted without hesitation, as did Zayd ibn Harithah, a freed slave who had chosen to stay with him as an adopted son rather than return to his own family when given the chance.",
        "Outside his household, it was his closest friend, Abu Bakr, whose belief mattered most in these earliest days — a respected, trusted merchant whose immediate acceptance carried real weight in Makkah, and whose quiet, persistent invitations to others brought in some of the men who would later be remembered among the greatest companions: Uthman ibn Affan, Zubayr ibn al-Awwam, Abdur Rahman ibn Awf, Sa'd ibn Abi Waqqas, Talha ibn Ubaydillah — a small circle at first, meeting quietly, often at the house of a new convert named al-Arqam, tucked away from Quraysh's notice, where Muhammad himself taught them the Quran directly and led them in prayer out of sight of the city's leading families.",
        "Alongside these well-connected converts came others with no clan protection at all to shield them — Bilal ibn Rabah, an enslaved Abyssinian; Ammar ibn Yasir and his parents Yasir and Sumayyah; Suhayb ar-Rumi, a former captive raised among the Byzantines; Khabbab ibn al-Aratt, a blacksmith with no powerful family behind him. Their acceptance of the same message carried a very different risk than it did for men like Abu Bakr, and it would not be long before that difference became painfully clear.",
        "For roughly three years, the message spread only this way — person to person, household to household, never announced publicly. Then came a revelation impossible to keep private any longer: a command to warn his closest relatives first, by name. He gathered the clan of Hashim and spoke to them directly, and though the response was mixed — his uncle Abu Lahab mocking him openly even as others stayed quiet — the private phase had ended.",
        "Soon after, he climbed the hill of Safa and called out to the whole of Quraysh by clan name until they gathered before him, curious. He asked them plainly: if he told them an army was massing behind the mountain to attack them, would they believe him? They answered that they would — they had never known him to lie. 'Then I am a warner to you,' he said, 'before a severe punishment.'",
        "The room of goodwill emptied instantly. His own uncle Abu Lahab snapped back with a curse, asking if this was all he had gathered them for, and stormed off — a moment so significant it was answered directly by revelation shortly after, an entire short surah condemning Abu Lahab and his wife by name for that exact reaction.",
        "From that day, tolerance turned to hostility. As long as the message had stayed quiet, Quraysh had mostly ignored it as one more oddity in a city full of soothsayers and poets. Once he began openly declaring their ancestors misguided and their idols powerless, the city's leading men decided this was a threat to be crushed, not a curiosity to be humored — and the years that followed would test exactly how far they were willing to go."
      ]
    },
    {
      title: "Years of Persecution",
      meta: "Torture, the first martyr, the migration to Abyssinia, and the boycott",
      sections: [
        "Quraysh's response escalated from mockery into physical brutality, aimed especially at converts who had no powerful clan to shield them. Bilal ibn Rabah, an Abyssinian slave, was dragged into the desert heat by his enraged owner, Umayyah ibn Khalaf, who pinned him beneath a massive boulder under the midday sun and demanded he renounce his faith. Bilal's answer, repeated through the pain, was a single word: 'Ahad, Ahad' — One, One — insisting on Allah's oneness even as he was being crushed for it. Abu Bakr eventually purchased his freedom outright, unable to watch it continue.",
        "Sumayyah bint Khabbat, an enslaved woman and mother of the early convert Ammar ibn Yasir, endured torture alongside her husband and son for their faith, and was ultimately killed by Abu Jahl, one of Quraysh's fiercest opponents of the message — becoming, in that moment, the first martyr Islam would count.",
        "Muhammad himself was largely protected from the very worst physical harm by one crucial fact: his uncle Abu Talib, though he never accepted Islam himself, refused to withdraw the clan's tribal protection from his nephew, and Quraysh's own customs made attacking a protected man a matter that could ignite a wider conflict they weren't yet ready to start.",
        "Two conversions from this period changed the community's position significantly. Hamzah, Muhammad's uncle and a formidable warrior known throughout Makkah, accepted Islam on the spot after learning that Abu Jahl had insulted and struck his nephew in the street — he marched straight to where Abu Jahl sat, struck him with his bow in anger, and declared himself a Muslim then and there, daring anyone to challenge him over it. Not long after, Umar ibn al-Khattab — until then one of the fiercest opponents of the message, setting out one day with a drawn sword intending to kill Muhammad himself — was redirected by news that his own sister Fatimah had secretly converted. Confronting her, he struck her before hearing her recite from a page of the Quran she had been studying, and something in the words themselves stopped him mid-anger; he went from there directly to Muhammad and accepted Islam, becoming almost overnight one of its most forceful defenders instead of one of its fiercest enemies.",
        "Seeing his weaker followers suffering with no such protection, he advised a group of them to leave Makkah entirely and seek refuge across the sea, in Abyssinia, under a Christian king known for his justice. Led by his cousin Ja'far ibn Abi Talib, a small group made the journey and was received by the Negus, Ashama, at his own court.",
        "Quraysh, alarmed at losing even this much control, sent a delegation with gifts to demand the refugees be returned. The Negus summoned Ja'far to answer for himself before making any decision. Ja'far spoke of the ignorance they had left behind — burying daughters alive, exploiting the weak, worshipping stone — and of what this new faith had commanded instead: honesty, prayer, kindness to orphans and neighbors, and the worship of one God alone. Asked for proof, he recited from Surah Maryam, the story of Mary and the birth of Jesus. The Negus wept, and refused to hand a single one of them back.",
        "Back in Makkah, having failed to break the movement through cruelty or diplomacy, the leading clans of Quraysh drew up a formal pact: no member of Quraysh would trade with, marry into, or have any dealings whatsoever with the clan of Hashim until they handed Muhammad over. The document was hung inside the Ka'bah itself for solemnity, and Muhammad's entire clan — believers and non-believers alike, simply by blood loyalty — was forced into a narrow mountain pass on the edge of the city, cut off from the rest of Makkah's supplies and society.",
        "The boycott lasted close to three years. Food had to be smuggled in at great risk, children's cries of hunger were said to be heard from outside the pass, and the hardship touched everyone confined there regardless of belief. It ended only when a few Quraysh leaders who had quietly opposed the boycott from the start pushed to have it annulled — and, as later tradition holds, when the pact document itself was found inside the Ka'bah eaten through by insects, with only the words 'In Your name, O Allah' left legible upon it."
      ]
    },
    {
      title: "The Year of Sorrow",
      meta: "The deaths of Khadijah and Abu Talib, the journey to Ta'if, and the Night Journey",
      sections: [
        "The boycott had barely ended when grief arrived in quick succession. Khadijah — his wife of twenty-five years, the first to believe him, the one who had steadied him on the very night revelation began — passed away, leaving a loss he never fully stopped feeling; he would speak of her fondly for the rest of his life, long after remarrying, in ways that visibly unsettled some of his later wives.",
        "Within weeks, his uncle Abu Talib died as well. Whatever Abu Talib's own beliefs had remained to the end, his protection had been the one thing standing between his nephew and Quraysh's worst instincts for over a decade. With him gone, that shield was gone too, and the hostility in Makkah grew sharper almost immediately — this stretch of loss is remembered simply as the Year of Sorrow.",
        "Searching for any place that might offer support or at least safety, he traveled to the nearby town of Ta'if to appeal to its leading tribe directly. They refused him outright, and worse — they set the town's youths and slaves upon him, pelting him with stones along the road out until his feet were bleeding and a companion who had accompanied him was struck trying to shield him.",
        "He took shelter, exhausted and injured, in an orchard belonging to two brothers who, though not sympathetic to his message, sent a servant out with grapes and water out of simple decency. The servant, a Christian named Addas, was startled when Muhammad said 'Bismillah' before eating — a phrase he recognized — and upon learning who Muhammad was and where he came from, Addas kissed his hands and feet, recognizing in him something connected to the prophet Yunus, whose story he knew from his own home city of Nineveh. Alone there, having been welcomed more warmly by this one stranger than by an entire town, Muhammad offered one of the most quoted supplications in the entire seerah — pleading to Allah about his own weakness and lack of resources, asking only that he not be abandoned to face this, as long as Allah himself was not angry with him.",
        "Tradition holds that the angel of the mountains appeared to him then, offering — if he wished it — to crush the town of Ta'if between the two mountains surrounding it, in response to how he had been treated. He refused, saying he hoped that if not these people themselves, then perhaps their descendants would one day worship Allah alone.",
        "Not long after this lowest point, he was granted what would become one of the most extraordinary nights of his life: the Isra and Mi'raj. He was taken first from Makkah to Jerusalem upon a swift, otherworldly mount known as Buraq, and led prayer there alongside the gathered spirits of every prophet who had come before him. From Jerusalem he ascended upward through the heavens themselves, meeting a different prophet at each level as he rose — Adam at the first heaven, Yahya and Isa together at the second, Yusuf at the third, Idris at the fourth, Harun at the fifth, Musa at the sixth, and Ibrahim at the seventh and highest, near a boundary called Sidrat al-Muntaha, the Lote Tree beyond which even Gabriel himself, who had guided him this far, could go no further.",
        "It was here that the command for the five daily prayers was given, originally fifty in number. Musa, on Muhammad's way back down, urged him repeatedly to return and ask for a lighter burden, certain his own people would never have managed fifty — and so Muhammad went back again and again, each time securing a reduction, until it was set at five prayers a day, carrying nonetheless the full reward of fifty for whoever kept them faithfully.",
        "When he related this journey to Quraysh the next morning, it was met with open ridicule — a night trip to Jerusalem and back was, to them, simply impossible. Abu Bakr, hearing the mockers repeat the story to him expecting him to break with his friend at last, answered instead that if Muhammad himself said it was true, then it was true — earning him, from that moment, the title he would carry ever after: as-Siddiq, the one who testifies to the truth without wavering."
      ]
    },
    {
      title: "The Pledges of Aqabah and the Hijrah",
      meta: "Madinah's invitation, the assassination plot, and the migration",
      sections: [
        "With Makkah's hostility now unchecked, Muhammad spent each pilgrimage season approaching the tribes who gathered there, hoping one would offer him and his message the protection Abu Talib's death had taken away. Most turned him away outright. Then, one season, he met a small group of men from Yathrib, a farming settlement to the north later known as Madinah, who listened, accepted the message, and carried it home with them.",
        "The following year, twelve men from Yathrib returned and met him quietly at a place called Aqabah, pledging to worship none but Allah, to avoid theft and immorality, and to obey him in what was right — a pledge notable for what it didn't yet include: no promise of defense or armed support, only personal conduct.",
        "He sent one of his companions, Mus'ab ibn Umair, back with them to Yathrib to teach the new faith properly. Mus'ab's patient, unforced approach won over entire households, including eventually Sa'd ibn Mu'adh, a leading chief who had gone to confront him angrily and left having accepted Islam himself — after which nearly his whole clan followed within a day.",
        "By the next pilgrimage season, seventy-three men and a handful of women from Yathrib came to Aqabah again, and this time the pledge was different in kind: they promised to defend Muhammad as fiercely as they would defend their own families, even at the cost of war with the rest of Arabia. This second pledge marked the true turning point — Muslims in Makkah began quietly emigrating to Yathrib in small groups over the following weeks, until almost none but Muhammad, Abu Bakr, and Ali remained.",
        "Quraysh's leadership, realizing what was happening and fearing a united, armed community forming just north of them, settled on a final plan: a group of young men, one drawn from every clan in Makkah, would strike him down together in his sleep, so that his own clan could never seek revenge on any single tribe for the killing.",
        "Warned in time, he asked Ali to sleep in his bed that night, wrapped in his cloak, to buy time — and Ali agreed without hesitation, fully aware of what discovery could mean for him. Muhammad slipped out of the house unseen, past the armed men waiting outside, and made his way with Abu Bakr not north toward Yathrib immediately, but south, to throw off pursuit — hiding for three days in a cave on Mount Thawr while Quraysh's search parties combed the routes leading away from the city.",
        "Even inside the cave, they were kept from starving and from discovery through a careful support network: Abu Bakr's son Abdullah would visit by night to relay news of what Quraysh was planning, while a shepherd in Abu Bakr's employ, Amir ibn Fuhayrah, grazed his flock over their tracks each evening to erase any trace of footsteps leading to the cave's mouth. Abu Bakr's daughter Asma carried food and supplies to them, and when she found she had nothing to tie the provisions with, she tore her own belt in two to make a cord — a detail remembered afterward in the name she carried for the rest of her life, Dhat al-Nitaqayn, 'she of the two belts.' Tradition adds that when Quraysh's search party reached the very mouth of the cave itself, a spider had spun a web across the entrance and a dove had nested just outside it, undisturbed, convincing the searchers that no one could possibly have gone in.",
        "One tracker, Suraqah ibn Malik, did pick up their trail once they finally set out, drawn by the bounty Quraysh had placed on Muhammad's head, and closed the distance more than once — only for his horse's legs to sink suddenly into the sand each time he got close. Shaken by what felt like a clear sign, Suraqah gave up the chase and asked instead for a written promise of safety for himself, which was granted; he would go on to accept Islam himself, years later, after Makkah's own conquest.",
        "The travelers reached Quba, on the outskirts of Yathrib, where Muhammad paused to build a simple mosque before completing the final stretch into the city itself. The reception there is remembered as genuine celebration — people lining the streets, children singing, an entire community that had spent two years waiting for exactly this arrival. The Hijrah was complete, and the calendar of the Muslim community would one day be counted from this very migration, rather than from his birth or even the first revelation itself."
      ]
    },
    {
      title: "Building Madinah",
      meta: "The mosque, the brotherhood pact, and the Constitution of Madinah",
      sections: [
        "Rather than choose the site for his new home and mosque himself, Muhammad let his camel wander freely through the city and simply stopped where she finally knelt — a plot of land used for drying dates, owned by two young orphaned brothers, Sahl and Suhayl. He insisted on paying them for it rather than accepting it as a gift, and construction began on what would become the Prophet's Mosque: plain, unadorned, palm trunks as pillars and palm leaves for a roof, with a few small rooms built alongside it for his household.",
        "One of his first acts as a community-builder was to pair each emigrant from Makkah, the Muhajireen, with a resident of Madinah, the Ansar, as sworn brothers — sharing homes, wealth, and support until the newcomers were back on their feet. When one Ansari, Sa'd ibn ar-Rabi', offered his new Muhajir brother Abdur Rahman ibn Awf literally half of everything he owned, including the choice of one of his two wives, Abdur Rahman declined every part of it, asking only to be shown the way to the marketplace — within a short time building his own trade and wealth from nothing.",
        "To hold this new, mixed city together — Muhajireen, Ansar, and the Jewish tribes who had lived in and around Madinah for generations — he drew up a written charter, now remembered as the Constitution of Madinah. It bound all these groups into a single political community with mutual defense obligations, recognized freedom of religious practice for the Jewish tribes as full members of that community, and named Muhammad as the one to whom disputes between any of the groups would be brought for judgment.",
        "Even something as basic as calling people to prayer had to be worked out fresh. A companion named Abdullah ibn Zayd came to Muhammad describing a dream in which he'd been taught the exact words of a call to prayer, and upon hearing it recited, Muhammad recognized it as true guidance and had it adopted immediately. Bilal — freed years earlier from torture in Makkah — was chosen for his powerful voice to become the first to climb up and call it out over the growing city, five times a day, for the rest of his life.",
        "Not everyone who emigrated had family or means to fall back on, and a section of the mosque itself was set aside as shelter for these poorer companions, who came to be known as Ahlus Suffah, the People of the Bench — living simply within the mosque grounds, often surviving on whatever charity the rest of the community could spare, while devoting themselves closely to learning directly from Muhammad.",
        "One companion who joined the community during these years, Salman al-Farisi, had traveled an extraordinarily long road to reach it — born in Persia, he had left his family's Zoroastrian faith to study under a series of Christian monks across the region, each one before dying directing him further on to the next, until the last one told him a prophet was soon to appear in Arabia and described signs by which he could be recognized. Sold into slavery along the way, Salman eventually reached Madinah still enslaved, and upon meeting Muhammad and finding every sign matched what he had been told across all those years of searching, he accepted Islam, and was later helped by the community to purchase his own freedom."
      ]
    },
    {
      title: "The Battle of Badr",
      meta: "The first major battle, and a decisive, unlikely victory",

  }

  els.chapterNav.addEventListener("click", function(e){
    var btn = e.target.closest("button[data-i]");
    if(!btn) return;
    renderChapter(parseInt(btn.getAttribute("data-i"), 10));
  });

  els.chapterBody.addEventListener("click", function(e){
    var btn = e.target.closest(".narrate-btn");
    if(!btn) return;
    var text = btn.getAttribute("data-text");
    btn.textContent = "Speaking…";
    speakText(text, function(){ btn.innerHTML = "&#9835; Narrate"; });
  });

  // Same on-device speech approach as index.html and hadith.html. Full
  // generated-audio support can be wired in later the same way, reusing
  // the same localStorage keys the main app already uses for the API key
  // and chosen voice.
  function speakText(text, onDone){
    if(!("speechSynthesis" in window)){ onDone(); return; }
    window.speechSynthesis.cancel();
    var utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.95;
    utter.onend = onDone;
    utter.onerror = onDone;
    window.speechSynthesis.speak(utter);
  }

  try{
    var prefs = JSON.parse(localStorage.getItem("noor_prefs_v1") || "{}");
    if(prefs.theme === "dark") document.documentElement.setAttribute("data-theme", "dark");
  }catch(e){}

  renderChapter(0);
</script>
</body>
</html>
