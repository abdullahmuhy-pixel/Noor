<style>

  .cat-btn{

  .cat-desc{ font-size:0.82rem; opacity:0.65; margin-bottom:18px; }

  .dua-arabic{

          translation: "May Allah bless the child given to you, may you give thanks to the One who gave, may the child reach full maturity, and may you be granted their righteousness.",
          ref: "A well-known reply attributed to Al-Hasan al-Basri when congratulated on the birth of his own son"
        }
      ]
    },
    {
      icon: "✈️", label: "Travel",
      desc: "For setting out on a journey, and returning safely.",
      duas: [
        {
          title: "Setting out on a journey",
          arabic: "اللَّهُ أَكْبَرُ، اللَّهُ أَكْبَرُ، اللَّهُ أَكْبَرُ، سُبْحَانَ الَّذِي سَخَّرَ لَنَا هَذَا وَمَا كُنَّا لَهُ مُقْرِنِينَ وَإِنَّا إِلَى رَبِّنَا لَمُنْقَلِبُونَ",
          translit: "Allahu Akbar, Allahu Akbar, Allahu Akbar. Subhanal-ladhi sakhkhara lana hadha wa ma kunna lahu muqrinin, wa inna ila Rabbina lamunqalibun",
          translation: "Allah is greatest, Allah is greatest, Allah is greatest. Glory to the One who has placed this transport at our service, for we could never have done so ourselves, and to our Lord we will surely return.",
          ref: "Sahih Muslim — from Surah Az-Zukhruf 43:13-14"
        },
        {
          title: "Entering a town or city",
          arabic: "اللَّهُمَّ رَبَّ السَّمَاوَاتِ السَّبْعِ وَمَا أَظْلَلْنَ، وَرَبَّ الْأَرَضِينَ السَّبْعِ وَمَا أَقْلَلْنَ، أَسْأَلُكَ خَيْرَ هَذِهِ الْقَرْيَةِ وَخَيْرَ أَهْلِهَا، وَأَعُوذُ بِكَ مِنْ شَرِّهَا وَشَرِّ أَهْلِهَا",
          translit: "Allahumma Rabbas-samawatis-sab'i wa ma azlalna, wa Rabbal-aradinas-sab'i wa ma aqlalna, as'aluka khayra hadhihil-qaryati wa khayra ahliha, wa a'udhu bika min sharriha wa sharri ahliha",
          translation: "O Allah, Lord of the seven heavens and all they shade, and Lord of the seven earths and all they carry, I ask You for the good of this town and the good of its people, and I seek refuge in You from its evil and the evil of its people.",
          ref: "Sunan Abi Dawud (abridged here for length)"
        },
        {
          title: "Returning from a journey",
          arabic: "آيِبُونَ تَائِبُونَ عَابِدُونَ لِرَبِّنَا حَامِدُونَ",
          translit: "Ayibuna ta'ibuna 'abiduna li-Rabbina hamidun",
          translation: "We return, repentant, worshipping, and praising our Lord.",
          ref: "Sahih al-Bukhari, Sahih Muslim — said by the Prophet on returning from a journey"
        }
      ]
    },
    {
      icon: "🤔", label: "Seeking Guidance (Istikharah)",
      desc: "For when a decision genuinely needs to be made, and you want Allah's guidance in it.",
      duas: [
        {
          title: "Istikharah — after praying two voluntary rak'ahs",
          arabic: "اللَّهُمَّ إِنِّي أَسْتَخِيرُكَ بِعِلْمِكَ، وَأَسْتَقْدِرُكَ بِقُدْرَتِكَ، وَأَسْأَلُكَ مِنْ فَضْلِكَ الْعَظِيمِ، فَإِنَّكَ تَقْدِرُ وَلَا أَقْدِرُ، وَتَعْلَمُ وَلَا أَعْلَمُ، وَأَنْتَ عَلَّامُ الْغُيُوبِ. اللَّهُمَّ إِنْ كُنْتَ تَعْلَمُ أَنَّ هَذَا الْأَمْرَ خَيْرٌ لِي فِي دِينِي وَمَعَاشِي وَعَاقِبَةِ أَمْرِي، فَاقْدُرْهُ لِي وَيَسِّرْهُ لِي، ثُمَّ بَارِكْ لِي فِيهِ. وَإِنْ كُنْتَ تَعْلَمُ أَنَّ هَذَا الْأَمْرَ شَرٌّ لِي، فَاصْرِفْهُ عَنِّي وَاصْرِفْنِي عَنْهُ، وَاقْدُرْ لِيَ الْخَيْرَ حَيْثُ كَانَ، ثُمَّ أَرْضِنِي بِهِ",
          translit: "Allahumma inni astakhiruka bi-'ilmika, wa astaqdiruka bi-qudratika, wa as'aluka min fadlikal-'azim, fa innaka taqdiru wa la aqdir, wa ta'lamu wa la a'lam, wa Anta 'Allamul-ghuyub. Allahumma in kunta ta'lamu anna hadhal-amra khayrun li fi dini wa ma'ashi wa 'aqibati amri, faqdurhu li wa yassirhu li, thumma barik li fih. Wa in kunta ta'lamu anna hadhal-amra sharrun li, fasrifhu 'anni wasrifni 'anhu, waqdur liyal-khayra haythu kan, thumma ardini bih",
          translation: "O Allah, I seek Your guidance through Your knowledge, and I seek ability through Your power, and I ask You from Your immense grace, for You are able and I am not, You know and I do not, and You are the Knower of the unseen. O Allah, if You know this matter to be good for me in my religion, my livelihood, and the outcome of my affairs, then decree it for me, make it easy for me, and bless it for me. And if You know this matter to be bad for me, then turn it away from me and turn me away from it, and decree for me the good wherever it is, and make me content with it.",
          ref: "Sahih al-Bukhari — said after naming the specific matter you're deciding on in place of 'this matter'"
        }
      ]
    },
    {
      icon: "💰", label: "Hardship & Debt",
      desc: "For financial strain, and the weight of what's owed.",
      duas: [
        {
          title: "For being overwhelmed by debt",
          arabic: "اللَّهُمَّ اكْفِنِي بِحَلَالِكَ عَنْ حَرَامِكَ، وَأَغْنِنِي بِفَضْلِكَ عَمَّنْ سِوَاكَ",
          translit: "Allahumma-kfini bihalalika 'an haramik, wa aghnini bifadlika 'amman siwak",
          translation: "O Allah, suffice me with what You have made lawful, away from what You have made unlawful, and enrich me by Your grace, so that I need no one but You.",
          ref: "Sunan at-Tirmidhi"
        },
        {
          title: "For ease in a difficult matter",
          arabic: "اللَّهُمَّ لَا سَهْلَ إِلَّا مَا جَعَلْتَهُ سَهْلًا، وَأَنْتَ تَجْعَلُ الْحَزْنَ إِذَا شِئْتَ سَهْلًا",
          translit: "Allahumma la sahla illa ma ja'altahu sahla, wa Anta taj'alul-hazna idha shi'ta sahla",
          translation: "O Allah, there is no ease except in what You have made easy, and You make the difficult easy if You will it.",
          ref: "Ibn Hibban (declared authentic); commonly cited alongside other hadith on hardship"
        }
      ]
    }
  ];

  var els = {
    catGrid: document.getElementById("catGrid"),
    catTitle: document.getElementById("catTitle"),
    catDesc: document.getElementById("catDesc"),
    duaList: document.getElementById("duaList")
  };

  var currentCat = 0;

  function renderGrid(){
    els.catGrid.innerHTML = CATEGORIES.map(function(c, i){
      return '<button type="button" class="cat-btn' + (i === currentCat ? " active" : "") + '" data-i="' + i + '">' +
        '<span class="icon">' + c.icon + '</span>' +
        '<span class="label">' + c.label + '</span>' +
        '</button>';
    }).join("");
  }

  function renderCategory(i){
    currentCat = i;
    var cat = CATEGORIES[i];
    els.catTitle.textContent = cat.icon + " " + cat.label;
    els.catDesc.textContent = cat.desc;
    els.duaList.innerHTML = cat.duas.map(function(d){
      return '<div class="dua-card">' +
        '<div class="dua-title">' + d.title + '</div>' +
        (d.arabic !== "—" ? '<div class="dua-arabic">' + d.arabic + '</div>' : '') +
        (d.translit !== "—" ? '<div class="dua-translit">' + d.translit + '</div>' : '') +
        '<div class="dua-translation">' + d.translation + '</div>' +
        '<div class="dua-meta">' +
          '<span class="dua-ref">' + d.ref + '</span>' +
          '<button type="button" class="narrate-btn" data-text="' + escapeAttr(d.translation) + '">&#9835; Narrate</button>' +
        '</div>' +
      '</div>';
    }).join("");
    renderGrid();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function escapeAttr(str){
    return String(str).replace(/&/g, "&amp;").replace(/"/g, "&quot;");
  }

  els.catGrid.addEventListener("click", function(e){
    var btn = e.target.closest(".cat-btn");
    if(!btn) return;
    renderCategory(parseInt(btn.getAttribute("data-i"), 10));
  });

  els.duaList.addEventListener("click", function(e){
    var btn = e.target.closest(".narrate-btn");
    if(!btn) return;
    var text = btn.getAttribute("data-text");
    btn.textContent = "Speaking…";
    speakText(text, function(){ btn.innerHTML = "&#9835; Narrate"; });
  });

  function speakText(text, onDone){
    if(!("speechSynthesis" in window)){ onDone(); return; }
    window.speechSynthesis.cancel();
    var utter = new SpeechSynthesisUtterance(text);
    utter.rate = 0.95;
    utter.onend = onDone;
    utter.onerror = onDone;
    window.speechSynthesis.speak(utter);
  }

  try{
    var prefs = JSON.parse(localStorage.getItem("noor_prefs_v1") || "{}");
    if(prefs.theme === "dark") document.documentElement.setAttribute("data-theme", "dark");
  }catch(e){}

  renderCategory(0);
</script>
</body>
</html>
